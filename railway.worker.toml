# Railway config for the Celery Worker service
# In Railway dashboard: create a second service from the same GitHub repo,
# set the Root Directory to "/" and point this file as the config, OR
# override the start command to the one below.

[build]
dockerfilePath = "Dockerfile.worker"

[deploy]
startCommand = "celery -A app.worker:celery_app worker --loglevel=info --concurrency=2"
restartPolicyType = "on_failure"

# This service shares the same environment variables as the API service.
# Required: DATABASE_URL, REDIS_URL, CELERY_BROKER_URL, CELERY_RESULT_BACKEND,
#           AI_PROVIDER, AI_API_KEY, JWT_SECRET_KEY
